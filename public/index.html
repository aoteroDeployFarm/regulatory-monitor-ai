<!DOCTYPE html>
<html>
<head>
    <title>Pulse Admin | Fabing Productions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 50px; }
        .card { max-width: 500px; margin: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card p-4">
        <h3 class="mb-4">Add New Subscriber</h3>
        <form id="subForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone (for SMS)</label>
                <input type="text" id="phone" class="form-control" placeholder="3035551212@tmomail.net">
            </div>
            <div class="mb-3">
                <label class="form-label">Tier</label>
                <select id="tier" class="form-select">
                    <option value="Basic">Basic ($99)</option>
                    <option value="Professional">Professional ($499)</option>
                    <option value="Enterprise">Enterprise ($999)</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Jurisdictions (comma separated)</label>
                <input type="text" id="juris" class="form-control" value="HI,CA,GA,FL">
            </div>
            <div class="form-check mb-4">
                <input type="checkbox" id="sms" class="form-check-input">
                <label class="form-check-label">Enable SMS Alerts</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Add to System</button>
        </form>
    </div>

    <script type="module">
        // Logic to call the Firebase Function would go here
        document.getElementById('subForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Ready to wire up! Shall we deploy the backend first?");
        };
    </script>
</body>
</html>
